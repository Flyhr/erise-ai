# Optional peripheral automation overlay for the official production stack.
# n8n stays outside the synchronous AI chat path and only handles external workflows.
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.90.0
    container_name: erise-ai-n8n
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      WEBHOOK_URL: ${N8N_WEBHOOK_BASE_URL:-http://localhost:5678/webhook/}
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${TZ:-Asia/Shanghai}
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows:/workflows:ro

volumes:
  n8n-data:
