map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;
  client_max_body_size 60m;
  resolver 127.0.0.11 valid=10s ipv6=off;

  set $backend_upstream backend:8080;
  set $ui_upstream ui:5173;

  location = /api/v1/ai/chat/stream {
    proxy_pass http://$backend_upstream/api/v1/ai/chat/stream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    add_header X-Accel-Buffering no;
  }

  location / {
    # proxy_pass http://erise-ai-ui-dev:5173;

    proxy_pass http://$ui_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_cache_bypass $http_upgrade;
  }

  location /api/ {
    proxy_pass http://$backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /actuator/ {
    proxy_pass http://$backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }
}
