server:
  port: 8081

spring:
  application:
    name: erise-ai-cloud
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

erise:
  internal:
    api-key: ${INTERNAL_API_KEY:change-this-in-production}
  backend:
    base-url: ${BACKEND_INTERNAL_BASE_URL:http://localhost:8080}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    chat-model: ${DEEPSEEK_CHAT_MODEL:deepseek-chat}
    embedding-model: ${DEEPSEEK_EMBEDDING_MODEL:}