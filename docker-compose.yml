services:
  mysql:
    image: mysql:8.4
    container_name: erise-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: erise-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: erise-ai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./erise-ai-backend
    container_name: erise-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      CLOUD_BASE_URL: http://cloud:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  cloud:
    build:
      context: ./erise-ai-cloud
    container_name: erise-ai-cloud
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      BACKEND_INTERNAL_BASE_URL: http://backend:8080
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${CLOUD_PORT:-8081}:8081"

  ui:
    build:
      context: ./erise-ai-ui
    container_name: erise-ai-ui
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: /api
      VITE_WS_BASE_URL: ws://localhost:${BACKEND_PORT}
      VITE_APP_TITLE: Erise-AI
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${UI_PORT:-5173}:80"

  nginx:
    image: nginx:1.29-alpine
    container_name: erise-ai-nginx
    restart: unless-stopped
    depends_on:
      - ui
      - backend
      - cloud
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  redis-data:
  minio-data:
