services:
  mysql:
    image: mysql:8.4
    container_name: erise-ai-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 20s
      timeout: 10s
      retries: 20

  redis:
    image: redis:7.4
    container_name: erise-ai-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: erise-ai-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: erise-ai-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-dev-qdrant-key}
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/6333 && printf 'GET /healthz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:0.6.8
    container_name: erise-ai-ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    command: ["serve"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 10

  ollama-init:
    image: ollama/ollama:0.6.8
    container_name: erise-ai-ollama-init
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen3:1.7b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        ollama pull "$${OLLAMA_CHAT_MODEL}"
        if [ "$${OLLAMA_EMBEDDING_MODEL}" != "$${OLLAMA_CHAT_MODEL}" ]; then
          ollama pull "$${OLLAMA_EMBEDDING_MODEL}"
        fi
        ollama list

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: erise-ai-litellm
    restart: unless-stopped
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "1"]
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
    volumes:
      - ./deploy/litellm/litellm.prod.yaml:/app/config.yaml:ro
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:4000/health/liveliness').status == 200 else 1)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    expose:
      - "4000"

  backend:
    image: erise-ai/backend:latest
    build:
      context: ./erise-ai-backend
      dockerfile: Dockerfile
    container_name: erise-ai-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      CLOUD_BASE_URL: http://cloud:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  cloud:
    image: erise-ai/cloud:latest
    build:
      context: ./AiAssistant
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn pypi.org files.pythonhosted.org}
    container_name: erise-ai-chat-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: prod
      MYSQL_DSN: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_API_KEY}
      JAVA_INTERNAL_BASE_URL: http://backend:8080/internal/v1
      JAVA_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      QDRANT_URL: http://qdrant:6333
      MODEL_PROVIDER: LITELLM
      MODEL_BASE_URL: http://litellm:4000/v1
      MODEL_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_BASE_URL: http://litellm:4000/v1
      LITELLM_API_KEY: ${LITELLM_API_KEY:-}
      LITELLM_MODEL: ${LITELLM_MODEL:-deepseek-chat}
      DEFAULT_MODEL_CODE: ${LITELLM_MODEL:-deepseek-chat}
      EMBEDDING_PROVIDER_CODE: LITELLM
      EMBED_BASE_URL: http://litellm:4000/v1
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      backend:
        condition: service_healthy
      litellm:
        condition: service_healthy
    ports:
      - "${CLOUD_PORT:-8081}:8081"

  ui:
    image: erise-ai/ui:latest
    build:
      context: ./erise-ai-ui
      dockerfile: Dockerfile
    container_name: erise-ai-ui
    restart: unless-stopped
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: /api
      VITE_WS_BASE_URL: ws://localhost:${BACKEND_PORT:-8080}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-Erise-AI}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${UI_PORT:-5173}:80"

  nginx:
    image: nginx:1.29-alpine
    container_name: erise-ai-nginx
    restart: unless-stopped
    depends_on:
      ui:
        condition: service_started
      backend:
        condition: service_healthy
      cloud:
        condition: service_healthy
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  redis-data:
  minio-data:
  qdrant-data:
  ollama-data:
