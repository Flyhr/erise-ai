# 开发环境配置 - 适配 Docker Compose 部署
services:
  mysql:
    image: mysql:8.4
    container_name: erise-ai-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./AiAssistant/sql/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4
    container_name: erise-ai-redis-dev
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: erise-ai-minio-dev
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data

  backend:
    build:
      context: ./erise-ai-backend
      dockerfile: Dockerfile.dev
    container_name: erise-ai-backend-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"] # Spring Boot 默认健康检查端点
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s #
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      CLOUD_BASE_URL: http://cloud:8081
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      cloud:
        condition: service_healthy
    volumes:
      - ./erise-ai-backend:/workspace
      - backend-target:/workspace/target
      - maven-cache:/root/.m2
    command: ["/bin/sh", "/workspace/docker/dev-entrypoint.sh"]
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  cloud:
    build:
      context: ./AiAssistant
      dockerfile: Dockerfile.dev
    container_name: erise-ai-chat-service-dev
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      APP_ENV: dev
      MYSQL_DSN: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}?charset=utf8mb4
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_API_KEY}
      JAVA_INTERNAL_BASE_URL: http://backend:8080/internal/v1
      JAVA_INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEFAULT_MODEL_CODE: ${DEFAULT_MODEL_CODE:-deepseek-chat}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./AiAssistant:/workspace
      - cloud-venv:/workspace/.venv
      - pip-cache:/root/.cache/pip
    command: ["/bin/sh", "/workspace/docker/dev-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "scripts/healthcheck.py"]
      interval: 15s
      timeout: 5s
      retries: 12
    ports:
      - "${CLOUD_PORT:-8081}:8081"

  ui:
    build:
      context: ./erise-ai-ui
      dockerfile: Dockerfile.dev
    container_name: erise-ai-ui-dev
    restart: unless-stopped
    working_dir: /workspace
    env_file:
      - .env.dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_BASE_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend:8080
      VITE_WS_BASE_URL: ws://localhost:${BACKEND_PORT:-8080}
      VITE_APP_TITLE: Erise-AI Dev
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./erise-ai-ui:/workspace
      - ui-node-modules:/workspace/node_modules
    command: ["/bin/sh", "/workspace/docker/dev-entrypoint.sh"]
    ports:
      - "${UI_PORT:-5173}:5173"

  nginx:
    image: nginx:1.29-alpine
    container_name: erise-ai-nginx-dev
    restart: unless-stopped
    depends_on:
      ui:
        condition: service_started # ui 只需启动
      backend:
        condition: service_healthy # 等待后端健康检查通过
      cloud:
        condition: service_started # cloud 启动即可
    ports:
      - "${NGINX_HTTP_PORT:-8088}:80"
    volumes:
      - ./deploy/nginx/default.dev.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  redis-data:
  minio-data:
  backend-target:
  maven-cache:
  cloud-venv:
  pip-cache:
  ui-node-modules:
