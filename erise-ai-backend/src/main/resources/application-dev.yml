logging:
  level:
    org.springframework.web: INFO
    org.springframework.security: INFO

spring:
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
  devtools:
    restart:
      enabled: true
      additional-paths:
        - src/main/java
        - src/main/resources
      exclude:
        - static/**
        - templates/**
    livereload:
      enabled: false
