server:
  port: 8080

spring:
  application:
    name: erise-ai-backend
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:${MYSQL_DB:erise_ai}}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5s
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

erise:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production}
    access-token-expire-minutes: 120
    refresh-token-expire-days: 14
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin123}
    bucket: ${MINIO_BUCKET:erise-ai}
  internal:
    api-key: ${INTERNAL_API_KEY:change-this-in-production}
  cloud:
    # Legacy property name retained for compatibility. The target service is AiAssistant (Python).
    base-url: ${CLOUD_BASE_URL:http://localhost:8081}
    default-model-code: ${DEFAULT_MODEL_CODE:deepseek-chat}
  bootstrap:
    admin-username: ${ADMIN_USERNAME:admin}
    admin-password: ${ADMIN_PASSWORD:Admin123!}
    admin-display-name: ${ADMIN_DISPLAY_NAME:System Admin}

logging:
  level:
    com.erise.ai.backend: INFO
